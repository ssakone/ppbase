<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPBase Admin</title>
  <link rel="stylesheet" href="/_/assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">

    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
      <div class="login-card">
        <div class="login-logo">
          <svg width="40" height="40" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="36" height="36" rx="8" fill="#4f46e5"/>
            <path d="M10 12h8a4 4 0 010 8h-8v-8zm2 2v4h6a2 2 0 000-4h-6z" fill="#fff"/>
            <path d="M10 22h8a4 4 0 010 8h-8v-8zm2 2v4h6a2 2 0 000-4h-6z" fill="#fff" opacity="0.6"/>
          </svg>
          <h1 class="login-title">PPBase</h1>
        </div>
        <p class="login-subtitle">Sign in to your admin dashboard</p>
        <form id="login-form" class="login-form">
          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input
              class="form-input"
              type="email"
              id="login-email"
              name="email"
              placeholder="admin@example.com"
              required
              autocomplete="email"
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input
              class="form-input"
              type="password"
              id="login-password"
              name="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            >
          </div>
          <div id="login-error" class="login-error hidden"></div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn">
            Sign in
          </button>
        </form>
      </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="dashboard hidden">

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <svg width="32" height="32" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="36" height="36" rx="8" fill="#4f46e5"/>
              <path d="M10 12h8a4 4 0 010 8h-8v-8zm2 2v4h6a2 2 0 000-4h-6z" fill="#fff"/>
              <path d="M10 22h8a4 4 0 010 8h-8v-8zm2 2v4h6a2 2 0 000-4h-6z" fill="#fff" opacity="0.6"/>
            </svg>
            <span class="sidebar-logo-text">PPBase</span>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-label">Collections</div>
          <nav class="sidebar-nav" id="collections-nav">
            <!-- Dynamically populated -->
          </nav>
        </div>

        <div class="sidebar-footer">
          <a href="#" class="nav-item nav-item-settings" id="nav-settings">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="8" cy="8" r="2.5"/>
              <path d="M13.5 8a5.5 5.5 0 01-.3 1.2l1.1.9a.3.3 0 01.1.4l-1.1 1.9a.3.3 0 01-.4.1l-1.3-.5a5 5 0 01-1 .6l-.2 1.4a.3.3 0 01-.3.2H8a.3.3 0 01-.3-.2l-.2-1.4a5 5 0 01-1-.6l-1.3.5a.3.3 0 01-.4-.1L3.7 10.5a.3.3 0 01.1-.4l1.1-.9A5.5 5.5 0 014.5 8c0-.4 0-.8.1-1.2l-1.1-.9a.3.3 0 01-.1-.4l1.1-1.9a.3.3 0 01.4-.1l1.3.5a5 5 0 011-.6l.2-1.4a.3.3 0 01.3-.2H10a.3.3 0 01.3.2l.2 1.4a5 5 0 011 .6l1.3-.5a.3.3 0 01.4.1l1.1 1.9a.3.3 0 01-.1.4l-1.1.9c.1.4.2.8.2 1.2z"/>
            </svg>
            Settings
          </a>
          <a href="#" class="nav-item nav-item-logout" id="nav-logout">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 14H3.33a1.33 1.33 0 01-1.33-1.33V3.33A1.33 1.33 0 013.33 2H6M10.67 11.33L14 8l-3.33-3.33M14 8H6"/>
            </svg>
            Log out
          </a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="content">
        <div class="content-header" id="content-header">
          <div class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item">Dashboard</span>
          </div>
          <div class="content-actions" id="content-actions"></div>
        </div>
        <div class="content-body" id="content-body">
          <!-- Dynamic content rendered here -->
        </div>
      </main>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title" id="modal-title"></h2>
          <button class="modal-close" id="modal-close" aria-label="Close modal">
            <svg width="22" height="22" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M5 5l10 10M15 5L5 15"/>
            </svg>
          </button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

  </div>

  <script src="/_/assets/js/api.js"></script>
  <script src="/_/assets/js/collections.js"></script>
  <script src="/_/assets/js/records.js"></script>
  <script src="/_/assets/js/app.js"></script>
</body>
</html>
