<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPBase Admin</title>
  <link rel="stylesheet" href="/_/assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">

    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
      <div class="login-card">
        <div class="login-logo">
          <svg width="40" height="40" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="36" height="36" rx="8" fill="#4f46e5"/>
            <path d="M10 12h8a4 4 0 010 8h-8v-8zm2 2v4h6a2 2 0 000-4h-6z" fill="#fff"/>
            <path d="M10 22h8a4 4 0 010 8h-8v-8zm2 2v4h6a2 2 0 000-4h-6z" fill="#fff" opacity="0.6"/>
          </svg>
          <h1 class="login-title">PPBase</h1>
        </div>
        <p class="login-subtitle">Sign in to your admin dashboard</p>
        <form id="login-form" class="login-form">
          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input
              class="form-input"
              type="email"
              id="login-email"
              name="email"
              placeholder="admin@example.com"
              required
              autocomplete="email"
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input
              class="form-input"
              type="password"
              id="login-password"
              name="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            >
          </div>
          <div id="login-error" class="login-error hidden"></div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn">
            Sign in
          </button>
        </form>
      </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="dashboard hidden">

      <!-- Sidebar -->
      <aside class="sidebar">
        <!-- Icon strip on the left -->
        <div class="sidebar-icon-strip">
          <div class="sidebar-logo-icon">
            <svg width="28" height="28" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="36" height="36" rx="8" fill="#4f46e5"/>
              <path d="M10 12h8a4 4 0 010 8h-8v-8zm2 2v4h6a2 2 0 000-4h-6z" fill="#fff"/>
              <path d="M10 22h8a4 4 0 010 8h-8v-8zm2 2v4h6a2 2 0 000-4h-6z" fill="#fff" opacity="0.6"/>
            </svg>
          </div>
          <a href="#" class="sidebar-icon-btn active" id="nav-icon-collections" title="Collections">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="6" height="6" rx="1"/>
              <rect x="11" y="3" width="6" height="6" rx="1"/>
              <rect x="3" y="11" width="6" height="6" rx="1"/>
              <rect x="11" y="11" width="6" height="6" rx="1"/>
            </svg>
          </a>
          <a href="#" class="sidebar-icon-btn" id="nav-icon-migrations" title="Migrations">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 5h14M3 10h14M3 15h14"/>
              <path d="M6 3v4M14 8v4M10 13v4"/>
            </svg>
          </a>
          <a href="#" class="sidebar-icon-btn" id="nav-icon-settings" title="Settings">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="10" cy="10" r="2.5"/>
              <path d="M16.5 10a6.5 6.5 0 01-.3 1.4l1.3 1a.4.4 0 01.1.5l-1.3 2.2a.4.4 0 01-.5.1l-1.5-.6a6 6 0 01-1.2.7l-.2 1.6a.4.4 0 01-.4.2H8.5a.4.4 0 01-.4-.2l-.2-1.6a6 6 0 01-1.2-.7l-1.5.6a.4.4 0 01-.5-.1L3.4 12.9a.4.4 0 01.1-.5l1.3-1A6.5 6.5 0 014.5 10c0-.5 0-.9.1-1.4l-1.3-1a.4.4 0 01-.1-.5l1.3-2.2a.4.4 0 01.5-.1l1.5.6a6 6 0 011.2-.7l.2-1.6A.4.4 0 018.5 3h2.6a.4.4 0 01.4.2l.2 1.6a6 6 0 011.2.7l1.5-.6a.4.4 0 01.5.1l1.3 2.2a.4.4 0 01-.1.5l-1.3 1c.1.5.2.9.2 1.4z"/>
            </svg>
          </a>
          <div style="flex:1"></div>
          <a href="#" class="sidebar-icon-btn sidebar-icon-logout" id="nav-logout" title="Log out">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7.5 17.5H4.17a1.67 1.67 0 01-1.67-1.67V4.17A1.67 1.67 0 014.17 2.5H7.5M13.33 14.17L17.5 10l-4.17-4.17M17.5 10H7.5"/>
            </svg>
          </a>
        </div>
        <!-- Collection list panel -->
        <div class="sidebar-collections-panel">
          <div class="sidebar-search">
            <svg class="sidebar-search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="7" cy="7" r="5"/>
              <path d="M15 15l-3.5-3.5"/>
            </svg>
            <input type="text" class="sidebar-search-input" id="collections-search" placeholder="Search collections...">
          </div>
          <nav class="sidebar-nav" id="collections-nav">
            <!-- Dynamically populated -->
          </nav>
          <div class="sidebar-new-collection">
            <button class="btn btn-secondary btn-full btn-new-collection" id="btn-sidebar-new-collection">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 1v12M1 7h12"/></svg>
              New collection
            </button>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="content">
        <div class="content-header" id="content-header">
          <div class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item">Dashboard</span>
          </div>
          <div class="content-actions" id="content-actions"></div>
        </div>
        <div class="content-body" id="content-body">
          <!-- Dynamic content rendered here -->
        </div>
      </main>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title" id="modal-title"></h2>
          <button class="modal-close" id="modal-close" aria-label="Close modal">
            <svg width="22" height="22" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M5 5l10 10M15 5L5 15"/>
            </svg>
          </button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
      </div>
    </div>

    <!-- Drawer Sidebar -->
    <div id="drawer-overlay" class="drawer-overlay hidden"></div>
    <div id="drawer" class="drawer hidden">
      <div class="drawer-header">
        <div class="drawer-header-left">
          <button class="drawer-close" id="drawer-close" aria-label="Close drawer">
            <svg width="22" height="22" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M5 5l10 10M15 5L5 15"/>
            </svg>
          </button>
          <h2 class="drawer-title" id="drawer-title"></h2>
        </div>
        <div id="drawer-header-actions"></div>
      </div>
      <div class="drawer-body" id="drawer-body"></div>
      <div class="drawer-footer" id="drawer-footer"></div>
    </div>

    <!-- Selection Bar (floating at bottom for record selection) -->
    <div id="selection-bar" class="selection-bar hidden"></div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

  </div>

  <script src="/_/assets/js/api.js"></script>
  <script src="/_/assets/js/collections.js"></script>
  <script src="/_/assets/js/records.js"></script>
  <script src="/_/assets/js/migrations.js"></script>
  <script src="/_/assets/js/app.js"></script>
</body>
</html>
